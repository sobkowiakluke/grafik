<div class="page">
<h2>Lista pracowników</h2>
<table class="employee-table">
    <tr>
        <th>
            <a href="{{ url_for('employee.list_employees', sort='id', order=next_order) }}">
            ID
            </a>
        </th>
        <th>
            <a href="{{ url_for('employee.list_employees', sort='first_name', order=next_order) }}">
                Imię
            </a>
        </th>
        <th>
            <a href="{{ url_for('employee.list_employees', sort='last_name', order=next_order) }}">
                Nazwisko
            </a>
        </th>
        <th>
            <a href="{{ url_for('employee.list_employees', sort='role', order=next_order) }}">
                Rola
            </a>
        </th>
        <th>
            <a href="{{ url_for('employee.list_employees', sort='active', order=next_order) }}">
                Aktywny
            </a>
        </th>
        <th>Akcje</th>
    </tr>

    {% for emp in employees %}
    <tr>
        <td>{{ emp.id }}</td>
        <td>{{ emp.first_name }}</td>
        <td>{{ emp.last_name }}</td>
        <td>{{ emp.role or 'Brak' }}</td>

        <td class="text-center">
            <input type="checkbox" disabled {% if emp.active %}checked{% endif %}>
        </td>

        <td>
            <button>Edit</button>
            <button>Usuń</button>
        </td>
    </tr>
    {% endfor %}
</table>
</div>
