<div class="page">
<h2>Dodaj grafik</h2>

<form method="post" action="{{ url_for('schedule_bp.add_schedule') }}" class="form">
    <div class="form-group">
        <label for="year">Rok</label>
        <input type="number" name="year" id="year" required>
    </div>

    <div class="form-group">
        <label for="month">Miesiąc</label>
        <input type="number" name="month" id="month" min="1" max="12" required>
    </div>

    <div class="form-group">
        <label for="status">Status</label>
        <select name="status" id="status">
            <option value="draft">draft</option>
            <option value="final">final</option>
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="button">Utwórz</button>
        <a href="{{ url_for('schedule_bp.list_schedules') }}"
           class="button button-secondary">
            Anuluj
        </a>
    </div>

</form>
</div>
