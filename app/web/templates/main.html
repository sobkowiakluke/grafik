<!DOCTYPE html>
<html lang="pl">
<head>

    <meta charset="UTF-8">
    <title>Panel grafiku</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div id="sidebar">

    <h3>Pracownicy</h3>
<ul>
    <li class="menu-link"
        data-url="{{ url_for('employee.list_employees') }}">
        Lista
    </li>

    <li class="menu-link"
        data-url="{{ url_for('employee.add_employee_form') }}">
        Dodawanie
    </li>
</ul>
    <h3>Grafiki</h3>
    <ul>
        <li class="menu-link"
            data-url="{{ url_for('schedule_bp.list_schedules') }}">
            Lista
        </li>

        <li class="menu-link"
            data-url="{{ url_for('schedule_bp.add_schedule') }}">
            Dodawanie
        </li>
    </ul>

</div>

<div id="main-content"></div>

<script>
const mainContent = document.getElementById('main-content');

document.querySelectorAll('.menu-link').forEach(el => {
    el.addEventListener('click', (e) => {

        e.preventDefault();   // ⭐ KLUCZOWE

        const url = el.dataset.url;

        mainContent.innerHTML =
            `<iframe name="content-frame"
                src="${url}"
                style="width:100%; height:100%; border:none;"></iframe>`;
    });
});
</script>
</body>
</html>
