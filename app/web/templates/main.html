<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel grafiku</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 240px;
            background: #2f3542;
            color: white;
            padding: 15px;
        }

        #sidebar h3 {
            margin-top: 20px;
            font-size: 16px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }

        #sidebar ul {
            list-style: none;
            padding: 0;
        }

        #sidebar li {
            padding: 8px;
            cursor: pointer;
        }

        #sidebar li:hover {
            background: #57606f;
        }

        #main-content {
            flex: 1;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="sidebar">

    <h3>Pracownicy</h3>
<ul>
    <li class="menu-link"
        data-url="{{ url_for('employee.list_employees') }}">
        Lista
    </li>

    <li class="menu-link"
        data-url="{{ url_for('employee.add_employee_form') }}">
        Dodawanie
    </li>
</ul>
    <h3>Grafiki</h3>
    <ul>
        <li class="menu-link"
            data-url="{{ url_for('schedule_bp.list_schedules') }}">
            Lista
        </li>

        <li class="menu-link"
            data-url="{{ url_for('schedule_bp.add_schedule') }}">
            Dodawanie
        </li>
    </ul>

</div>

<div id="main-content"></div>

<script>
const mainContent = document.getElementById('main-content');

document.querySelectorAll('.menu-link').forEach(el => {
    el.addEventListener('click', (e) => {

        if (e.target.tagName === "BUTTON" || e.target.tagName === "INPUT") {
            return;   // ← NIE przechwytuj formularzy
        }
        const url = el.dataset.url;

        mainContent.innerHTML =
            `<iframe name="content-frame"
                src="/${url.replace(/^\/+/, '')}"
                style="width:100%; height:100%; border:none;"></iframe>`;
    });
});
</script>
</body>
</html>
