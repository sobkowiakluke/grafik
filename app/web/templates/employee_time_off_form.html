<h2>Dodaj wolne</h2>

<form method="post" action="{{ url_for('employee.add_time_off') }}" class="form">
    <div class="form-group">
        <label for="employee_id">Pracownik</label>
        <select name="employee_id" id="employee_id" required>
            {% for e in employees %}
            <option value="{{ e.id }}">{{ e.first_name }} {{ e.last_name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="date_from">Data od</label>
        <input type="date" name="date_from" id="date_from" required>
    </div>

    <div class="form-group">
        <label for="date_to">Data do</label>
        <input type="date" name="date_to" id="date_to" required>
    </div>
<div class="form-group">
    <label for="reason_id">Przyczyna</label>
    <select name="reason_id" id="reason_id" required>
        {% for r in reasons %}
        <option value="{{ r.id }}">{{ r.name }}</option>
        {% endfor %}
    </select>
</div>

    <div class="form-actions">
        <button type="submit" class="button">Zapisz</button>
        <a href="{{ url_for('employee.list_employees') }}"
           class="button button-secondary">
            Anuluj
        </a>
    </div>

</form>
